<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <header>
    <input id="search" type="search" placeholder="제목 · 채널 · 태그 검색">
    <button id="add-toggle" title="영상 직접 추가">＋</button>
    <button id="sync" title="치지직 후원내역에서 영도 영상 불러오기">동기화</button>
    <button id="manage" title="폴더 관리 페이지 열기">관리</button>
  </header>
  <form id="add-form" hidden>
    <input id="add-url" type="url" placeholder="유튜브 / 치지직 클립 URL" required>
    <input id="add-title" type="text" placeholder="제목 (선택)">
    <div class="time-row">
      <input id="add-start" type="text" placeholder="시작 (예: 1:30)">
      <input id="add-end" type="text" placeholder="종료 (예: 2:05)">
      <button type="submit">추가</button>
    </div>
  </form>
  <div id="filter-row">
    <select id="folder-filter"></select>
  </div>
  <div id="status"></div>
  <datalist id="folder-list"></datalist>
  <ul id="list"></ul>
  <template id="item-tpl">
    <li class="item">
      <button class="fav" title="즐겨찾기">☆</button>
      <img class="logo" alt="">

      <div class="meta">
        <div class="title"></div>
        <div class="sub"></div>
        <div class="chips"></div>
      </div>
      <button class="edit" title="수정">수정</button>
      <button class="copy" title="링크 복사">복사</button>
      <button class="del" title="목록에서 삭제">✕</button>
    </li>
  </template>
  <template id="edit-tpl">
    <li class="item editing">
      <div class="edit-fields">
        <input class="e-url" type="url" placeholder="URL">
        <input class="e-title" type="text" placeholder="제목">
        <div class="time-row">
          <input class="e-start" type="text" placeholder="시작 (예: 1:30)">
          <input class="e-end" type="text" placeholder="종료 (예: 2:05)">
          <button class="e-save" type="button">저장</button>
          <button class="e-cancel" type="button">취소</button>
        </div>
      </div>
    </li>
  </template>
  <script type="module" src="popup.js"></script>
</body>
</html>
